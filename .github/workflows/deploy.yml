name: CI/CD Pipeline for Business Card

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: ./
          match: '**/*.html'

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create test file
        run: |
          mkdir -p tests
          cat > tests/simple.test.js << 'EOF'
          test('basic math works', () => {
            expect(2 + 2).toBe(4);
          });
          test('string concatenation works', () => {
            expect('CI' + 'CD').toBe('CICD');
          });
          EOF

      - name: Install Jest
        run: npm install --save-dev jest

      - name: Run tests
        run: npx jest tests/

  deploy:
    runs-on: ubuntu-latest
    needs: [linter, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server via SCP
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "index.html, css/, js/"
          target: "/var/www/card-by-CICD/"
          strip_components: 0

      - name: Reload Nginx on server
        uses: appleboy/ssh-action@v0.1.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            sudo systemctl reload nginx
            echo "Deployment completed at $(date)"