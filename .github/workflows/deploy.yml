name: CI/CD Pipeline for Business Card

on:
  push:
    branches:
      - master

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: ./
          match: '**/*.html'

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create simple test file
        run: |
          mkdir -p tests
          cat > tests/simple.test.js << 'EOF'
          test('basic math works', () => {
            expect(2 + 2).toBe(4);
          });
          test('string concatenation works', () => {
            expect('CI' + 'CD').toBe('CICD');
          });
          EOF

      - name: Install Jest
        run: npm install --save-dev jest

      - name: Run tests
        run: npx jest tests/

  deploy:
    runs-on: ubuntu-latest
    needs: [linter, test]
    if: github.ref == 'refs/heads/master' && success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create SSH key file
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copy files to server via SCP
        run: |
          scp -i ~/.ssh/id_rsa -r index.html css js ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/var/www/card-by-CICD/

      - name: Reload Nginx on server
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "sudo systemctl reload nginx && echo 'Deployment completed at $(date)'"
      
      - name: Debug SSH connection
        run: |
          ssh -i ~/.ssh/id_rsa -v ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "echo 'SSH works'"